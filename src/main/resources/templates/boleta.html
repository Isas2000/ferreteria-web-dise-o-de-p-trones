<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Boleta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --color-50:#F0F0F4; --color-100:#D6D6E1; --color-200:#BCBCCE; --color-300:#A1A1BB;
            --color-400:#8787A8; --color-500:#6D6D95; --color-600:#59597B; --color-700:#464661;
            --color-800:#333346; --color-900:#20202C; --color-950:#0D0D12;
        }
        body { font-family:'Segoe UI',Arial,sans-serif; background:var(--color-50); color:var(--color-900); display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; position:relative; }
        .card { background:white; padding:2.5rem; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.1); width:380px; }
        h1 { color:var(--color-900); font-size:1.3rem; margin-bottom:1.5rem; text-align:center; }
        .fila { display:flex; justify-content:space-between; padding:0.4rem 0; border-bottom:1px solid var(--color-100); font-size:0.9rem; }
        .fila span:first-child { color:var(--color-600); }
        .total { font-weight:bold; font-size:1.1rem; margin-top:1rem; display:flex; justify-content:space-between; }
        .fab-volver {
            position: fixed; top: 2rem; left: 2rem;
            width: 50px; height: 50px; border-radius: 50%;
            background: white; border: none;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            text-decoration: none;
        }
        .fab-volver i { color: #808080; font-size: 1.2rem; }
    </style>
</head>
<body>
    <a class="fab-volver" th:href="@{/panel}"><i class="fa-solid fa-angle-left"></i></a>
    <div class="card">
        <h1>Boleta</h1>
        <div class="fila"><span>Cliente</span><span th:text="${nombreCliente}"></span></div>
        <div class="fila"><span>DNI</span><span th:text="${dni}"></span></div>
        <div class="fila"><span>Fecha</span><span th:text="${#temporals.format(fecha, 'dd/MM/yyyy HH:mm')}"></span></div>
        <div class="fila"><span>Producto</span><span th:text="${nombreProducto}"></span></div>
        <div class="fila"><span>Cantidad</span><span th:text="${cantidad}"></span></div>
        <div class="fila"><span>Precio unitario</span><span th:text="'S/ ' + ${#numbers.formatDecimal(precioUnitario,1,2)}"></span></div>
        <div class="total"><span>Total</span><span th:text="'S/ ' + ${#numbers.formatDecimal(total,1,2)}"></span></div>
    </div>
</body>
</html>
